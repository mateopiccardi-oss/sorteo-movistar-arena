<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inscripción al sorteo — Movistar Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080C14;--bg2:#0D1220;--bg3:#111929;
  --line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.12);
  --white:#F4F7FF;--gray1:#C8D4E8;--gray2:#7A8FAD;--gray3:#3D506B;
  --ice:#00D4FF;--ice2:#60E8FF;--ice-bg:rgba(0,212,255,0.07);
  --green:#00F0A0;--green-bg:rgba(0,240,160,0.08);
  --amber:#FFB020;--amber-bg:rgba(255,176,32,0.08);
  --red:#FF3D5A;--red-bg:rgba(255,61,90,0.08);
  --r:10px;--r-sm:6px;
  --fd:'Barlow Condensed',sans-serif;
  --fb:'Barlow',sans-serif;
}
body{
  background:var(--bg);color:var(--white);
  font-family:var(--fb);font-size:15px;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(0,212,255,0.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,rgba(0,212,255,0.04) 0%,transparent 50%);
}

.wrap{
  width:100%;max-width:440px;
  position:relative;z-index:1;
}

/* Logo */
.logo{text-align:center;margin-bottom:32px}
.logo img{height:32px;width:auto;opacity:.9}
.logo-fallback{font-family:var(--fd);font-size:20px;font-weight:700;letter-spacing:3px;color:var(--white);display:none}

/* Card */
.card{
  background:var(--bg2);
  border:1px solid var(--line2);
  border-radius:var(--r);
  padding:28px 28px 24px;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--ice),transparent 60%);
  opacity:.35;
}

.show-name{
  font-family:var(--fd);font-size:36px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  color:var(--white);line-height:1;margin-bottom:4px;
}
.show-meta{font-size:12px;color:var(--gray3);margin-bottom:24px}

/* Steps */
.step{display:none}.step.on{display:block}

.step-label{
  font-size:9px;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:var(--ice);
  margin-bottom:6px;
}
.step-title{
  font-family:var(--fd);font-size:24px;font-weight:700;
  color:var(--white);margin-bottom:16px;text-transform:uppercase;
}

/* Input */
.field{margin-bottom:14px}
.field label{
  display:block;font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--gray3);margin-bottom:5px;
}
.field input{
  width:100%;background:rgba(255,255,255,0.04);
  border:1px solid var(--line2);border-radius:var(--r-sm);
  color:var(--white);font-family:var(--fb);font-size:14px;
  padding:11px 14px;outline:none;
  transition:border-color .15s,background .15s;
}
.field input::placeholder{color:var(--gray3)}
.field input:focus{border-color:var(--ice);background:rgba(0,212,255,0.04)}
.field input:disabled{opacity:.5;cursor:not-allowed}

/* Nombre preview */
.nombre-preview{
  background:rgba(0,212,255,0.07);
  border:1px solid rgba(0,212,255,0.2);
  border-radius:var(--r-sm);
  padding:12px 14px;
  margin-bottom:14px;
  display:none;
}
.np-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray3);margin-bottom:3px}
.np-name{font-family:var(--fd);font-size:26px;font-weight:700;color:var(--ice2);letter-spacing:.5px;text-transform:uppercase}

/* Button */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:12px;border-radius:var(--r-sm);cursor:pointer;
  font-family:var(--fb);font-size:14px;font-weight:600;
  border:none;transition:all .2s;
}
.btn-primary{
  background:var(--ice);color:var(--bg);
  box-shadow:0 0 24px rgba(0,212,255,0.25);
}
.btn-primary:hover{background:var(--ice2);box-shadow:0 0 32px rgba(0,212,255,0.4);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{
  background:transparent;color:var(--gray2);
  border:1px solid var(--line2);margin-top:8px;
}
.btn-outline:hover{color:var(--white);border-color:rgba(255,255,255,0.25)}

/* Alert */
.alert{
  padding:10px 13px;border-radius:var(--r-sm);
  font-size:12px;margin-bottom:12px;line-height:1.5;
  display:none;
}
.alert.show{display:block}
.a-err{background:var(--red-bg);border:1px solid rgba(255,61,90,0.2);color:var(--red)}
.a-warn{background:var(--amber-bg);border:1px solid rgba(255,176,32,0.2);color:var(--amber)}

/* Success */
.success-wrap{text-align:center;padding:8px 0}
.success-ic{
  width:60px;height:60px;border-radius:50%;
  background:var(--green-bg);border:1px solid rgba(0,240,160,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin:0 auto 16px;
}
.success-title{font-family:var(--fd);font-size:32px;font-weight:700;color:var(--green);text-transform:uppercase;margin-bottom:6px}
.success-msg{font-size:13px;color:var(--gray2);line-height:1.6}

/* Spinner */
.spinner{
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(0,0,0,0.2);border-top-color:var(--bg);
  animation:spin .7s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{text-align:center;margin-top:20px;font-size:11px;color:var(--gray3)}
</style>
</head>

  <div class="card">
    <!-- Nombre del show (se completa desde la URL) -->
    <div class="show-name" id="show-nombre">Cargando...</div>

      <div class="step-title">Ingresá tu mail</div>
      <div class="alert a-err" id="err-mail"></div>
      <div class="field">
        <label>Mail corporativo</label>
        <input
          type="email"
          id="input-mail"
          placeholder="tunombre@movistararena.com.ar"
          autocomplete="email"
          onkeydown="if(event.key==='Enter')validar()"
        >
      </div>
      <button class="btn btn-primary" onclick="validar()" id="btn-validar">
        <span id="btn-validar-txt">Verificar mail</span>

      <div class="step-title">¿Sos vos?</div>

<script>
// ── CONFIGURACIÓN ──────────────────────────────────────────
// IMPORTANTE: reemplazá esta URL con la de tu Apps Script desplegado
const SCRIPT_URL = "https://script.google.com/a/macros/movistararena.com.ar/s/AKfycby_KOpMJOKKZSr22ig0j4w-CWVu88z5ghSHzBQqxqOSEQAGj238dhsaSKQr6Pv_tddDaQ/exec";

// ── LEER PARÁMETROS DE LA URL ──────────────────────────────
// El link que compartís a los empleados lleva estos parámetros:
// formulario.html?show=SHOW_ID&nombre=Emanero&fecha=15/05/2025&venue=Movistar Arena
const params = new URLSearchParams(window.location.search);
const SHOW_ID     = params.get("show")   || "";
const SHOW_NOMBRE = params.get("nombre") || "Show";
const SHOW_FECHA  = params.get("fecha")  || "";
const SHOW_VENUE  = params.get("venue")  || "Movistar Arena";

let mailValido = "";
let nombreValido = "";

// ── INIT ──────────────────────────────────────────────────
document.getElementById("show-nombre").textContent = SHOW_NOMBRE;
document.getElementById("show-meta").textContent =
  [SHOW_FECHA, SHOW_VENUE].filter(Boolean).join(" · ");

if (!SHOW_ID) {
  document.getElementById("show-nombre").textContent = "Link inválido";
  document.getElementById("show-meta").textContent = "Este formulario no tiene un show configurado.";
}

// ── HELPERS ───────────────────────────────────────────────
function showStep(n) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("on"));
  document.getElementById("step-" + n).classList.add("on");
}
function setLoading(btnId, spinId, txtId, loading) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(spinId).style.display = loading ? "block" : "none";
  document.getElementById(txtId).style.opacity = loading ? "0.4" : "1";
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 4000);
}
async function callScript(data) {
  const r = await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
  });
  return r.json();
}

// ── PASO 1: VALIDAR MAIL ───────────────────────────────────
async function validar() {
  const mail = document.getElementById("input-mail").value.trim();
  if (!mail || !mail.includes("@")) {
    showErr("err-mail", "Ingresá un mail válido.");
    return;
  }
  if (!SHOW_ID) { showErr("err-mail", "Este formulario no tiene un show configurado."); return; }

  setLoading("btn-validar", "spin-validar", "btn-validar-txt", true);

  try {
    const res = await callScript({ action: "validarMail", mail });
    if (!res.ok) { showErr("err-mail", res.error || "Error al verificar."); return; }
    if (!res.existe) {
      showErr("err-mail", "Tu mail no está registrado en el sistema. Contactá a RRHH.");
      return;
    }
    mailValido = mail;
    nombreValido = res.nombre;
    document.getElementById("preview-nombre").textContent = res.nombre.toUpperCase();
    document.getElementById("preview-mail").textContent = mail;
    showStep(2);
  } catch (e) {
    showErr("err-mail", "Error de conexión. Intentá de nuevo.");
  } finally {
    setLoading("btn-validar", "spin-validar", "btn-validar-txt", false);
  }
}

// ── PASO 2: INSCRIBIR ──────────────────────────────────────
async function inscribir() {
  setLoading("btn-inscribir", "spin-inscribir", "btn-inscribir-txt", true);

  try {
    const res = await callScript({
      action: "inscribir",
      mail: mailValido,
      showId: SHOW_ID,
      showNombre: SHOW_NOMBRE,
      fecha: SHOW_FECHA,
    });

    if (!res.ok) { showErr("err-confirm", res.error || "Error al inscribirse."); return; }

    if (res.yaInscripto) {
      document.getElementById("success-title").textContent = "Ya estás inscripto";
      document.getElementById("success-msg").innerHTML =
        `<strong>${res.nombre}</strong>, ya habías confirmado tu inscripción para <strong>${SHOW_NOMBRE}</strong>.<br><br>Si hay algún problema contactá a RRHH.`;
    } else {
      document.getElementById("success-title").textContent = "¡Inscripto!";
      document.getElementById("success-msg").innerHTML =
        `<strong>${res.nombre}</strong>, tu inscripción para <strong>${SHOW_NOMBRE}</strong> fue confirmada.<br><br>Si salís sorteado/a vas a recibir un mail con tu entrada. ¡Buena suerte! 🎉`;
    }
    showStep(3);
  } catch (e) {
    showErr("err-confirm", "Error de conexión. Intentá de nuevo.");
  } finally {
    setLoading("btn-inscribir", "spin-inscribir", "btn-inscribir-txt", false);
  }
}

function volverStep1() {
  document.getElementById("input-mail").value = "";
  showStep(1);
}
</script>
</body>
</html>
